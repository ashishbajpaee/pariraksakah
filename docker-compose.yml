x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  POSTGRES_HOST: timescaledb
  POSTGRES_PORT: "5432"
  POSTGRES_DB: cybershield
  NEO4J_URI: bolt://neo4j:7687

services:
  # ─── Infrastructure ───────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [cybershield-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [cybershield-net]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on: [kafka]
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    networks: [cybershield-net]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes: [redis-data:/data]
    networks: [cybershield-net]

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybershield}
      POSTGRES_USER: ${POSTGRES_USER:-cybershield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [cybershield-net]

  neo4j:
    image: neo4j:5-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme_neo4j}
    volumes: [neo4j-data:/data]
    networks: [cybershield-net]

  prometheus:
    image: prom/prometheus:v2.47.0
    ports: ["9090:9090"]
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [cybershield-net]

  grafana:
    image: grafana/grafana:10.1.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana}
    depends_on: [prometheus]
    networks: [cybershield-net]

  mlflow:
    build:
      context: ./infrastructure/mlflow
      dockerfile: Dockerfile
    ports: ["5000:5000"]
    networks: [cybershield-net]

  flink-jobmanager:
    image: flink:1.18-java11
    ports: ["8082:8081"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    networks: [cybershield-net]

  flink-taskmanager:
    image: flink:1.18-java11
    depends_on: [flink-jobmanager]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager\ntaskmanager.numberOfTaskSlots: 4"
    networks: [cybershield-net]

  # ─── CyberShield-X Services ───────────────────────────────
  threat-detection:
    build:
      context: ./services/threat-detection
      dockerfile: Dockerfile
    ports: ["8001:8001"]
    environment:
      <<: *common-env
      ATDE_INFERENCE_PORT: "8001"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on: [kafka, timescaledb, neo4j, redis]
    networks: [cybershield-net]

  access-control:
    build:
      context: ./services/access-control
      dockerfile: Dockerfile
    ports: ["8002:8002"]
    environment:
      <<: *common-env
      ACCESS_CONTROL_PORT: "8002"
    depends_on: [redis, timescaledb]
    networks: [cybershield-net]

  anti-phishing:
    build:
      context: ./services/anti-phishing
      dockerfile: Dockerfile
    ports: ["8003:8003"]
    environment:
      <<: *common-env
      ANTI_PHISHING_PORT: "8003"
    depends_on: [kafka, timescaledb, redis]
    networks: [cybershield-net]

  incident-response:
    build:
      context: ./services/incident-response
      dockerfile: Dockerfile
    ports: ["8004:8004"]
    environment:
      <<: *common-env
      INCIDENT_RESPONSE_PORT: "8004"
    depends_on: [kafka, timescaledb, redis]
    networks: [cybershield-net]

  bio-auth:
    build:
      context: ./services/bio-auth
      dockerfile: Dockerfile
    ports: ["8005:8005"]
    environment:
      <<: *common-env
      BIO_AUTH_PORT: "8005"
    depends_on: [redis, timescaledb]
    networks: [cybershield-net]

  swarm-agent:
    build:
      context: ./services/swarm-agent
      dockerfile: Dockerfile
    ports: ["8006:8006"]
    environment:
      <<: *common-env
      SWARM_AGENT_PORT: "8006"
    depends_on: [redis, kafka]
    networks: [cybershield-net]

  cognitive-firewall:
    build:
      context: ./services/cognitive-firewall
      dockerfile: Dockerfile
    ports: ["8007:8007"]
    environment:
      <<: *common-env
      COGNITIVE_FIREWALL_PORT: "8007"
    depends_on: [kafka, redis, timescaledb]
    networks: [cybershield-net]

  self-healing:
    build:
      context: ./services/self-healing
      dockerfile: Dockerfile
    ports: ["8008:8008"]
    environment:
      <<: *common-env
      SELF_HEALING_PORT: "8008"
    depends_on: [kafka, redis]
    networks: [cybershield-net]

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports: ["8080:8000"]
    environment:
      <<: *common-env
      API_GATEWAY_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
    depends_on:
      - threat-detection
      - access-control
      - anti-phishing
      - incident-response
      - bio-auth
      - swarm-agent
      - cognitive-firewall
      - self-healing
    networks: [cybershield-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    depends_on: [api-gateway]
    networks: [cybershield-net]

  # ─── Security Chaos Engineering Platform ──────────────────────
  chaos-experiment-engine:
    build:
      context: ./services/chaos-experiment-engine
      dockerfile: Dockerfile
    ports: ["8020:8020"]
    environment:
      <<: *common-env
      CHAOS_ENGINE_PORT: "8020"
      DOCKER_HOST: unix:///var/run/docker.sock
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme_neo4j}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./datasets:/datasets:ro
    depends_on: [kafka, timescaledb, neo4j, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  chaos-injection-agent:
    build:
      context: ./services/chaos-injection-agent
      dockerfile: Dockerfile
    ports: ["8021:8021"]
    environment:
      <<: *common-env
      CHAOS_AGENT_PORT: "8021"
      DOCKER_HOST: unix:///var/run/docker.sock
      API_GATEWAY_URL: http://api-gateway:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./datasets:/datasets:ro
    depends_on: [kafka, chaos-experiment-engine]
    restart: unless-stopped
    privileged: true
    networks: [cybershield-net]

  chaos-scheduler:
    build:
      context: ./services/chaos-scheduler
      dockerfile: Dockerfile
    ports: ["8022:8022"]
    environment:
      <<: *common-env
      CHAOS_SCHEDULER_PORT: "8022"
      CHAOS_ENGINE_URL: http://chaos-experiment-engine:8020
      PROMETHEUS_URL: http://prometheus:9090
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/chaos-experiment-engine/scenarios.json:/app/scenarios.json:ro
    depends_on: [kafka, chaos-experiment-engine, prometheus]
    restart: unless-stopped
    networks: [cybershield-net]

  chaos-ai-intelligence:
    build:
      context: ./services/chaos-ai-intelligence
      dockerfile: Dockerfile
    ports: ["8023:8023"]
    environment:
      <<: *common-env
      CHAOS_AI_PORT: "8023"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme_neo4j}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./datasets:/datasets:ro
      - ./services/chaos-experiment-engine/scenarios.json:/app/scenarios.json:ro
    depends_on: [kafka, timescaledb, neo4j, mlflow, chaos-experiment-engine]
    restart: unless-stopped
    networks: [cybershield-net]

  chaos-guardrails:
    build:
      context: ./services/chaos-guardrails
      dockerfile: Dockerfile
    ports: ["8024:8024"]
    environment:
      <<: *common-env
      CHAOS_GUARDRAILS_PORT: "8024"
      PROMETHEUS_URL: http://prometheus:9090
      CHAOS_ENGINE_URL: http://chaos-experiment-engine:8020
      CHAOS_MAX_EXPERIMENTS_DEV: "10"
      CHAOS_MAX_EXPERIMENTS_STAGING: "3"
    depends_on: [kafka, timescaledb, redis, prometheus]
    restart: unless-stopped
    networks: [cybershield-net]

  quantum-cbom-scanner:
    build:
      context: ./services/quantum-crypto/scanner
      dockerfile: Dockerfile
    ports: ["8030:8030"]
    environment:
      <<: *common-env
      QUANTUM_SCANNER_PORT: "8030"
      SCAN_ROOT: "/app/codebase"
    volumes:
      - .:/app/codebase:ro
    depends_on: [redis, timescaledb]
    restart: unless-stopped
    networks: [cybershield-net]

  quantum-agility-api:
    build:
      context: ./services/quantum-crypto/src
      dockerfile: Dockerfile
    ports: ["8031:8031"]
    environment:
      <<: *common-env
      CRYPTO_AGILITY_PORT: "8031"
    restart: unless-stopped
    networks: [cybershield-net]

  # ─── AI Predictive Threat Intelligence ─────────────────────
  prediction-engine:
    build:
      context: ./services/predictive-threat-intel/src
      dockerfile: Dockerfile
    ports: ["8040:8040"]
    environment:
      <<: *common-env
      THREAT_INTEL_PORT: "8040"
      RETRAIN_INTERVAL_HOURS: "6"
    volumes:
      - prediction-models:/models
    depends_on: [kafka, timescaledb, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  threat-feed-integration:
    build:
      context: ./services/predictive-threat-intel/feeds
      dockerfile: Dockerfile
    ports: ["8041:8041"]
    environment:
      <<: *common-env
      THREAT_FEED_PORT: "8041"
      FEED_REFRESH_SECS: "900"
      NVD_API_KEY: ${NVD_API_KEY:-}
      ALIENVAULT_OTX_KEY: ${ALIENVAULT_OTX_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
    depends_on: [redis, timescaledb]
    restart: unless-stopped
    networks: [cybershield-net]

  ueba-behavioral-engine:
    build:
      context: ./services/predictive-threat-intel/behavioral
      dockerfile: Dockerfile
    ports: ["8042:8042"]
    environment:
      <<: *common-env
      BEHAVIORAL_PORT: "8042"
    depends_on: [redis, timescaledb]
    restart: unless-stopped
    networks: [cybershield-net]

  # ─── Security DNA Cryptographic System Identity Platform ─────
  dna-identity-engine:
    build:
      context: ./services/security-dna/identity-engine
      dockerfile: Dockerfile
    ports: ["8050:8050"]
    environment:
      <<: *common-env
      DNA_PORT: "8050"
    depends_on: [kafka, timescaledb]
    restart: unless-stopped
    networks: [cybershield-net]
    privileged: true # required for hardware / proc reading
    pid: "host"

  dna-certificate-authority:
    build:
      context: ./services/security-dna/certificate-authority
      dockerfile: Dockerfile
    ports: ["8051:8051"]
    environment:
      <<: *common-env
      CA_PORT: "8051"
    depends_on: [timescaledb, kafka]
    restart: unless-stopped
    networks: [cybershield-net]

  dna-fingerprint-monitor:
    build:
      context: ./services/security-dna/fingerprint-monitor
      dockerfile: Dockerfile
    ports: ["8052:8052"]
    environment:
      <<: *common-env
      MONITOR_PORT: "8052"
    depends_on: [timescaledb, neo4j, kafka]
    restart: unless-stopped
    networks: [cybershield-net]

  dna-trust-registry:
    build:
      context: ./services/security-dna/trust-registry
      dockerfile: Dockerfile
    ports: ["8053:8053"]
    environment:
      <<: *common-env
      TRUST_PORT: "8053"
    depends_on: [timescaledb, neo4j, kafka]
    restart: unless-stopped
    networks: [cybershield-net]

  dna-anomaly-detector:
    build:
      context: ./services/security-dna/anomaly-detector
      dockerfile: Dockerfile
    ports: ["8054:8054"]
    environment:
      <<: *common-env
      ANOMALY_PORT: "8054"
    depends_on: [kafka, timescaledb, neo4j]
    restart: unless-stopped
    networks: [cybershield-net]

  dna-dashboard-api:
    build:
      context: ./services/security-dna/dashboard-api
      dockerfile: Dockerfile
    ports: ["8055:8055"]
    environment:
      <<: *common-env
      DASHBOARD_API_PORT: "8055"
    depends_on: [timescaledb, neo4j]
    restart: unless-stopped
    networks: [cybershield-net]

  # ─── Decentralized Security Response Network (DSRN) ─────────
  dsrn-peer-node:
    build:
      context: ./services/dsrn/peer-node
      dockerfile: Dockerfile
    ports: ["8060:8060", "4001:4001"]
    environment:
      <<: *common-env
      DSRN_PEER_PORT: "8060"
      DSRN_P2P_PORT: "4001"
      DSRN_MODE: ${DSRN_MODE:-development}
    depends_on: [kafka, timescaledb, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  dsrn-consensus-engine:
    build:
      context: ./services/dsrn/consensus-engine
      dockerfile: Dockerfile
    ports: ["8061:8061"]
    environment:
      <<: *common-env
      CONSENSUS_PORT: "8061"
      PBFT_MIN_PEERS: "4"
      PBFT_TIMEOUT_SECS: "30"
    depends_on: [kafka, timescaledb, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  dsrn-threat-gossip:
    build:
      context: ./services/dsrn/threat-gossip
      dockerfile: Dockerfile
    ports: ["8062:8062"]
    environment:
      <<: *common-env
      GOSSIP_PORT: "8062"
      GOSSIP_FANOUT: "3"
      GOSSIP_INTERVAL_SECS: "15"
      GOSSIP_MAX_HOPS: "10"
    depends_on: [kafka, timescaledb, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  dsrn-response-coordinator:
    build:
      context: ./services/dsrn/response-coordinator
      dockerfile: Dockerfile
    ports: ["8063:8063"]
    environment:
      <<: *common-env
      RESPONSE_PORT: "8063"
    depends_on: [kafka, timescaledb, neo4j]
    restart: unless-stopped
    networks: [cybershield-net]

  dsrn-peer-trust-manager:
    build:
      context: ./services/dsrn/peer-trust-manager
      dockerfile: Dockerfile
    ports: ["8064:8064"]
    environment:
      <<: *common-env
      TRUST_MANAGER_PORT: "8064"
    depends_on: [kafka, timescaledb, neo4j, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  dsrn-blockchain-ledger:
    build:
      context: ./services/dsrn/blockchain-ledger
      dockerfile: Dockerfile
    ports: ["8065:8065"]
    environment:
      <<: *common-env
      LEDGER_PORT: "8065"
    depends_on: [kafka, timescaledb]
    restart: unless-stopped
    networks: [cybershield-net]

  dsrn-network-monitor:
    build:
      context: ./services/dsrn/network-monitor
      dockerfile: Dockerfile
    ports: ["8066:8066"]
    environment:
      <<: *common-env
      MONITOR_PORT: "8066"
    depends_on: [kafka, timescaledb, neo4j, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  dsrn-dashboard-api:
    build:
      context: ./services/dsrn/dashboard-api
      dockerfile: Dockerfile
    ports: ["8067:8067"]
    environment:
      <<: *common-env
      DSRN_DASHBOARD_PORT: "8067"
    depends_on: [timescaledb, neo4j, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  # ─── Neuromorphic Computing AI Security System ─────────
  neuro-snn-engine:
    build:
      context: ./services/neuro-snn-engine
      dockerfile: Dockerfile
    ports: ["8070:8070"]
    environment:
      <<: *common-env
      NEURO_SNN_PORT: "8070"
    depends_on: [kafka, timescaledb, neo4j, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-synaptic-memory:
    build:
      context: ./services/neuro-synaptic-memory
      dockerfile: Dockerfile
    ports: ["8071:8071"]
    environment:
      <<: *common-env
      NEURO_SYNAPTIC_PORT: "8071"
    depends_on: [kafka, timescaledb, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-plasticity-manager:
    build:
      context: ./services/neuro-plasticity-manager
      dockerfile: Dockerfile
    ports: ["8072:8072"]
    environment:
      <<: *common-env
      NEURO_PLASTICITY_PORT: "8072"
    depends_on: [kafka, timescaledb, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-anomaly-cortex:
    build:
      context: ./services/neuro-anomaly-cortex
      dockerfile: Dockerfile
    ports: ["8073:8073"]
    environment:
      <<: *common-env
      NEURO_CORTEX_PORT: "8073"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on: [kafka, timescaledb, mlflow]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-threat-hippocampus:
    build:
      context: ./services/neuro-threat-hippocampus
      dockerfile: Dockerfile
    ports: ["8074:8074"]
    environment:
      <<: *common-env
      NEURO_HIPPOCAMPUS_PORT: "8074"
    depends_on: [kafka, timescaledb, neo4j]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-adaptive-immune:
    build:
      context: ./services/neuro-adaptive-immune
      dockerfile: Dockerfile
    ports: ["8075:8075"]
    environment:
      <<: *common-env
      NEURO_IMMUNE_PORT: "8075"
    depends_on: [kafka, timescaledb, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-dream-consolidator:
    build:
      context: ./services/neuro-dream-consolidator
      dockerfile: Dockerfile
    ports: ["8076:8076"]
    environment:
      <<: *common-env
      NEURO_DREAM_PORT: "8076"
    depends_on: [kafka, timescaledb, neo4j, redis]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-evolution-system:
    build:
      context: ./services/neuro-evolution-system
      dockerfile: Dockerfile
    ports: ["8077:8077"]
    environment:
      <<: *common-env
      NEURO_EVOLUTION_PORT: "8077"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on: [kafka, timescaledb, mlflow]
    restart: unless-stopped
    networks: [cybershield-net]

  neuro-dashboard-api:
    build:
      context: ./services/neuro-dashboard-api
      dockerfile: Dockerfile
    ports: ["8078:8078"]
    environment:
      <<: *common-env
      NEURO_DASHBOARD_PORT: "8078"
    depends_on: [kafka, timescaledb, neo4j, prometheus]
    restart: unless-stopped
    networks: [cybershield-net]

volumes:
  prediction-models:
  postgres-data:
  neo4j-data:
  redis-data:

networks:
  cybershield-net:
    driver: bridge
