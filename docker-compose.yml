x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  POSTGRES_HOST: timescaledb
  POSTGRES_PORT: "5432"
  POSTGRES_DB: cybershield
  NEO4J_URI: bolt://neo4j:7687

services:
  # ─── Infrastructure ───────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [cybershield-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [cybershield-net]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on: [kafka]
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    networks: [cybershield-net]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes: [redis-data:/data]
    networks: [cybershield-net]

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybershield}
      POSTGRES_USER: ${POSTGRES_USER:-cybershield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [cybershield-net]

  neo4j:
    image: neo4j:5-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme_neo4j}
    volumes: [neo4j-data:/data]
    networks: [cybershield-net]

  prometheus:
    image: prom/prometheus:v2.47.0
    ports: ["9090:9090"]
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: [cybershield-net]

  grafana:
    image: grafana/grafana:10.1.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme_grafana}
    depends_on: [prometheus]
    networks: [cybershield-net]

  mlflow:
    build:
      context: ./infrastructure/mlflow
      dockerfile: Dockerfile
    ports: ["5000:5000"]
    networks: [cybershield-net]

  flink-jobmanager:
    image: flink:1.18-java11
    ports: ["8082:8081"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
    networks: [cybershield-net]

  flink-taskmanager:
    image: flink:1.18-java11
    depends_on: [flink-jobmanager]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager\ntaskmanager.numberOfTaskSlots: 4"
    networks: [cybershield-net]

  # ─── CyberShield-X Services ───────────────────────────────
  threat-detection:
    build:
      context: ./services/threat-detection
      dockerfile: Dockerfile
    ports: ["8001:8001"]
    environment:
      <<: *common-env
      ATDE_INFERENCE_PORT: "8001"
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on: [kafka, timescaledb, neo4j, redis]
    networks: [cybershield-net]

  access-control:
    build:
      context: ./services/access-control
      dockerfile: Dockerfile
    ports: ["8002:8002"]
    environment:
      <<: *common-env
      ACCESS_CONTROL_PORT: "8002"
      KEYS_DIR: "/tmp/cybershield/keys"
    depends_on: [redis, timescaledb]
    networks: [cybershield-net]

  anti-phishing:
    build:
      context: ./services/anti-phishing
      dockerfile: Dockerfile
    ports: ["8003:8003"]
    environment:
      <<: *common-env
      ANTI_PHISHING_PORT: "8003"
      FEEDBACK_STORE_PATH: "/tmp/cybershield/feedback_store.jsonl"
    depends_on: [kafka, timescaledb, redis]
    networks: [cybershield-net]

  incident-response:
    build:
      context: ./services/incident-response
      dockerfile: Dockerfile
    ports: ["8004:8004"]
    environment:
      <<: *common-env
      INCIDENT_RESPONSE_PORT: "8004"
    depends_on: [kafka, timescaledb, redis]
    networks: [cybershield-net]

  bio-auth:
    build:
      context: ./services/bio-auth
      dockerfile: Dockerfile
    ports: ["8005:8005"]
    environment:
      <<: *common-env
      BIO_AUTH_PORT: "8005"
    depends_on: [redis, timescaledb]
    networks: [cybershield-net]

  swarm-agent:
    build:
      context: ./services/swarm-agent
      dockerfile: Dockerfile
    ports: ["8006:8006"]
    environment:
      <<: *common-env
      SWARM_AGENT_PORT: "8006"
    depends_on: [redis, kafka]
    networks: [cybershield-net]

  cognitive-firewall:
    build:
      context: ./services/cognitive-firewall
      dockerfile: Dockerfile
    ports: ["8007:8007"]
    environment:
      <<: *common-env
      COGNITIVE_FIREWALL_PORT: "8007"
    depends_on: [kafka, redis, timescaledb]
    networks: [cybershield-net]

  self-healing:
    build:
      context: ./services/self-healing
      dockerfile: Dockerfile
    ports: ["8008:8008"]
    environment:
      <<: *common-env
      SELF_HEALING_PORT: "8008"
    depends_on: [kafka, redis]
    networks: [cybershield-net]

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports: ["8080:8000"]
    environment:
      <<: *common-env
      API_GATEWAY_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
    depends_on:
      - threat-detection
      - access-control
      - anti-phishing
      - incident-response
      - bio-auth
      - swarm-agent
      - cognitive-firewall
      - self-healing
    networks: [cybershield-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    depends_on: [api-gateway]
    networks: [cybershield-net]

volumes:
  postgres-data:
  neo4j-data:
  redis-data:

networks:
  cybershield-net:
    driver: bridge
