components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    RolloutToken:
      type: apiKey
      in: header
      name: X-Rollout-Token

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        service:
          type: string
          example: api-gateway
        version:
          type: string
          example: 1.0.0
        time:
          type: string
          format: date-time
      required: [status, service, version]

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          example: ready
        services:
          type: object
          additionalProperties:
            type: string
            enum: [healthy, unhealthy]
      required: [status, services]

    DashboardResponse:
      type: object
      properties:
        total_events_24h:
          type: integer
        active_threats:
          type: integer
        blocked_attacks:
          type: integer
        mean_detect_time_ms:
          type: integer
        healthy_services:
          type: integer
        total_services:
          type: integer
        alerts_by_severity:
          type: object
          additionalProperties:
            type: integer
        top_attack_types:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
              latency_ms:
                type: integer
      required:
        - total_events_24h
        - active_threats
        - blocked_attacks
        - mean_detect_time_ms
        - alerts_by_severity
        - top_attack_types

    AlertItem:
      type: object
      properties:
        id:
          type: string
        severity:
          type: string
        type:
          type: string
        source_ip:
          type: string
        destination_ip:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time
        mitre_technique:
          type: string
        campaign_id:
          type: string
        kill_chain_stage:
          type: string
        campaign_risk_score:
          type: number
        status:
          type: string
        confidence:
          type: number
        source:
          type: string

    AlertsResponse:
      type: object
      properties:
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/AlertItem'
        total:
          type: integer
        is_live:
          type: boolean
        degraded:
          type: boolean
        rollout_mode:
          type: string
          enum: [live, synthetic]
        generated_at:
          type: string
          format: date-time
      required: [alerts, total, is_live, degraded, rollout_mode, generated_at]

    PodsTTLResponse:
      type: object
      properties:
        source:
          type: string
          example: kubernetes
        namespace:
          type: string
        ttl_sec_default:
          type: integer
        generated_at:
          type: string
          format: date-time
        pods:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              namespace:
                type: string
              phase:
                type: string
              age_sec:
                type: integer
              ttl_sec:
                type: integer
              remaining_sec:
                type: integer
              ephemeral:
                type: boolean

    RolloutStatusResponse:
      type: object
      properties:
        alerts_mode:
          type: string
          enum: [live, synthetic]
        deploy_env:
          type: string
        synthetic_fallback_allowed:
          type: boolean
      required: [alerts_mode, deploy_env, synthetic_fallback_allowed]

    RolloutUpdateRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [live, synthetic]
        reason:
          type: string
        force:
          type: boolean
      required: [mode]

    RolloutUpdateResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        alerts_mode:
          type: string
          enum: [live, synthetic]
        previous:
          type: string
          enum: [live, synthetic]
        deploy_env:
          type: string
      required: [status, alerts_mode, previous, deploy_env]

    InnovationStatus:
      type: object
      properties:
        name:
          type: string
        prompt:
          type: string
        status:
          type: string
          enum: [active, degraded, offline]
      required: [name, prompt, status]
