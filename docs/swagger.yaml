          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Refresh response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /auth/.well-known/openid-configuration:
    get:
      tags: [Auth]
      summary: OIDC discovery
      responses:
        '200':
          description: OIDC metadata
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /auth/.well-known/jwks.json:
    get:
      tags: [Auth]
      summary: JSON Web Key Set
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/innovations/status:
    get:
      tags: [Protected Proxy]
      summary: Aggregated innovation status
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Innovation statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InnovationStatus'
        '401':
          description: Missing or invalid JWT
        '403':
          description: Access denied by authorization middleware

  /api/v1/threats/{path}:
    parameters:
      - in: path
        name: path
        required: true
        schema:
          type: string
        description: URL-encoded downstream path segment for threat-detection proxy.
    get:
      tags: [Protected Proxy]
      summary: Threat-detection proxy GET
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Proxied response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Protected Proxy]
      summary: Threat-detection proxy POST
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
