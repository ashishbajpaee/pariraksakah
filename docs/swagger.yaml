openapi: 3.0.3
info:
  title: Pariraksakah Backend API
  version: 1.0.0
  description: |
    Swagger/OpenAPI documentation for backend APIs exposed by the API Gateway.

    Notes:
    - Public endpoints are available without JWT.
    - Protected endpoints require Bearer JWT unless otherwise stated.
    - Several protected routes are proxy pass-through routes to internal services.
servers:
  - url: http://localhost:8080
    description: Local API Gateway

tags:
  - name: Health
  - name: Dashboard
  - name: Rollout
  - name: Auth
  - name: Phishing
  - name: Threats
  - name: WebSocket
  - name: Protected Proxy

paths:
  /health:
    get:
      tags: [Health]
      summary: Gateway health
      responses:
        '200':
          description: Gateway is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags: [Health]
      summary: Gateway readiness and upstream checks
      responses:
        '200':
          description: Readiness status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /ws/events:
    get:
      tags: [WebSocket]
      summary: WebSocket event stream upgrade endpoint
      description: HTTP endpoint upgraded to WebSocket for real-time events.
      responses:
        '101':
          description: Switching Protocols
        '400':
          description: Upgrade failed

  /api/v1/dashboard:
    get:
      tags: [Dashboard]
      summary: Aggregated live dashboard metrics
      responses:
        '200':
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'

  /api/v1/alerts:
    get:
      tags: [Dashboard]
      summary: Live alerts feed
      responses:
        '200':
          description: Alert feed payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertsResponse'

  /api/v1/infra/pods/ttl:
    get:
      tags: [Dashboard]
      summary: Ephemeral pod age and TTL snapshot
      responses:
        '200':
          description: Pod TTL payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodsTTLResponse'

  /api/v1/rollout/alerts:
    get:
      tags: [Rollout]
      summary: Alert rollout mode status
      responses:
        '200':
          description: Rollout status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolloutStatusResponse'

  /api/v1/admin/rollout/alerts:
    post:
      tags: [Rollout]
      summary: Update alert rollout mode
      description: |
        Updates alert mode between live and synthetic.
        If rollout admin token is configured, provide X-Rollout-Token header.
      security:
        - RolloutToken: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolloutUpdateRequest'
      responses:
        '200':
          description: Rollout mode updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolloutUpdateResponse'
        '400':
          description: Invalid request body
        '401':
          description: Invalid rollout token
        '403':
          description: Rollout update blocked by environment guardrails

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login (public gateway route)
      description: Proxied to access-control service auth login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Login response from access-control
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/auth/verify:
    post:
      tags: [Auth]
      summary: Verify token (public gateway route)
      description: Proxied to access-control service auth verify.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Verification response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/phishing/check/url:
    post:
      tags: [Phishing]
      summary: Public URL phishing check
      description: Proxied to anti-phishing analyze URL endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: URL analysis response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/phishing/check/email:
    post:
      tags: [Phishing]
      summary: Public email phishing check
      description: Proxied to anti-phishing analyze email endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Email analysis response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/threats/recent:
    get:
      tags: [Threats]
      summary: Recent threats (public gateway route)
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            default: 50
      responses:
        '200':
          description: Recent threats response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /auth/login:
    post:
      tags: [Auth]
      summary: Legacy login route
      description: Public access-control proxy route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Auth response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /auth/token:
    post:
      tags: [Auth]
      summary: Legacy token route
      description: Public access-control proxy route.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /auth/refresh:
